# Self-hosted сценарий: инфра + cozby-brain в одном стеке.
#
#   docker compose up -d --build
#
# Инфра (db + qdrant + minio) подтягивается из docker-compose.local.yml
# через include: оба файла делят volume'ы и сервисы, так что можно
# свободно переключаться между "сервер на хосте" (./run.sh) и
# "сервер в контейнере" (./run-docker.sh / эту команду) — они шарят
# те же контейнеры инфры (при COMPOSE_PROJECT_NAME=cozby-brain в .env
# имена контейнеров совпадают, никаких port-конфликтов).
#
# Все host-порты и адреса подключения параметризованы — см. .env.example.
include:
  - path: docker-compose.local.yml

services:
  cozby-brain:
    build:
      context: .
      dockerfile: ${COZBY_DOCKERFILE:-Dockerfile}
    image: ${COZBY_IMAGE:-cozby-brain:local}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    # .env поставляет LLM_*, EMBEDDING_MODEL, RUST_LOG и т.п.
    env_file: .env
    # Явный environment перекрывает одноимённые значения из env_file.
    # В .env URL'ы указывают на localhost (для хоста), а внутри
    # compose-сети адресация по именам сервисов. Если надо смотреть в
    # managed-сервис — перекрой COZBY_INTERNAL_* в шелле или .env.
    environment:
      DATABASE_URL: ${COZBY_INTERNAL_DB_URL:-postgres://cozby:cozby@db:5432/cozby_brain}
      QDRANT_URL: ${COZBY_INTERNAL_QDRANT_URL:-http://qdrant:6334}
      S3_ENDPOINT: ${COZBY_INTERNAL_S3_ENDPOINT:-http://minio:9000}
      HTTP_ADDR: 0.0.0.0:8081
    ports:
      - "${HTTP_PORT:-8081}:8081"
