# Локальная инфра для разработки:
# - db + qdrant запускаются в Docker
# - приложение (cozby-brain) запускается НА ХОСТЕ через ./run.sh на порту 8081
#
# В корп-прод инфре БД и Qdrant — внешние managed-сервисы,
# приложение подключается к ним через env-переменные DATABASE_URL / QDRANT_URL.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cozby
      POSTGRES_PASSWORD: cozby
      POSTGRES_DB: cozby_brain
    ports:
      - "5432:5432"
    volumes:
      - cozby_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cozby -d cozby_brain"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # one-shot job to create the bucket after MinIO comes up
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/cozby-attachments &&
      echo 'bucket ready'
      "

volumes:
  cozby_db:
  qdrant_data:
  minio_data:
