# Два сценария:
#
# 1. Native dev: `docker compose up -d`  → только db + qdrant + minio.
#    Приложение запускается на хосте через ./run.sh.
#
# 2. All-in-docker: `docker compose --profile full up -d --build`
#    → к инфре добавляется контейнер cozby-brain (собирается из Dockerfile).
#    Используй ./run-docker.sh.
#
# Сервис cozby-brain скрыт за profile `full`, чтобы сценарий 1 не собирал
# образ приложения зря.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cozby
      POSTGRES_PASSWORD: cozby
      POSTGRES_DB: cozby_brain
    ports:
      - "5432:5432"
    volumes:
      - cozby_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cozby -d cozby_brain"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # one-shot job to create the bucket after MinIO comes up
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/cozby-attachments &&
      echo 'bucket ready'
      "

  # --- Scenario 2: app in docker ---------------------------------------
  cozby-brain:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile
    image: cozby-brain:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    # .env поставляет LLM_*, EMBEDDING_MODEL и т.п. (ключи провайдера).
    # Явный environment ниже перезатирает адреса инфры — внутри compose-сети
    # сервисы резолвятся по именам сервисов, не localhost.
    env_file: .env
    environment:
      DATABASE_URL: postgres://cozby:cozby@db:5432/cozby_brain
      QDRANT_URL: http://qdrant:6334
      S3_ENDPOINT: http://minio:9000
      HTTP_ADDR: 0.0.0.0:8081
    ports:
      - "8081:8081"

volumes:
  cozby_db:
  qdrant_data:
  minio_data:
