# Локальная инфра — только внешние сервисы (postgres + qdrant + minio).
#
# Используется:
#   1. Напрямую, когда приложение запускается на хосте (см. ./run.sh):
#        docker compose -f docker-compose.local.yml up -d
#   2. Через include: из docker-compose.yml (self-hosted сценарий).
#
# Все host-порты параметризованы через env-переменные (.env или шелл).
# Дефолты совпадают с каноническими портами сервисов — если ничего
# не задавать, поведение прежнее.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cozby
      POSTGRES_PASSWORD: cozby
      POSTGRES_DB: cozby_brain
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - cozby_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cozby -d cozby_brain"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    ports:
      - "${QDRANT_REST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Одноразовый контейнер — создаёт bucket и завершается.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/cozby-attachments &&
      echo 'bucket ready'
      "

volumes:
  cozby_db:
  qdrant_data:
  minio_data:
